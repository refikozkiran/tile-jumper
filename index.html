<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Neon Tile Jumper</title>
<style>
  :root{
    --neon:#23f6ff;
    --tile:#1aa8ff;
    --tile2:#20ff7a;
    --bg1:#061226;
    --bg2:#02101d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020712;font-family:Arial,Helvetica,sans-serif;color:white;touch-action:none}
  #game{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#020712}
  .topbar{
    position:fixed;left:0;right:0;top:0;height:74px;background:#050506;
    display:flex;align-items:center;gap:14px;padding:10px 18px;z-index:5;
    box-shadow:0 8px 28px rgba(0,0,0,.35)
  }
  .logo{
    width:46px;height:46px;border-radius:12px;background:
    radial-gradient(circle at 35% 20%,#53ffff 0 8%,transparent 9%),
    linear-gradient(135deg,#ff1ee9,#2a25ff 55%,#050a2a);
    box-shadow:0 0 18px rgba(117,30,255,.7);position:relative;overflow:hidden
  }
  .logo:before{content:"";position:absolute;left:9px;bottom:10px;width:28px;height:9px;background:#ff2de8;border-radius:12px;transform:skewX(-20deg);box-shadow:0 0 12px #ff2de8}
  .title{font-size:25px;font-weight:900;letter-spacing:.2px;white-space:nowrap}
  .icons{margin-left:auto;display:flex;gap:22px;font-size:30px;color:white;opacity:.95}
  .hud{position:fixed;left:0;right:0;top:88px;z-index:4;pointer-events:none}
  .score{font-size:76px;font-weight:300;text-align:center;line-height:1;text-shadow:0 0 18px rgba(255,255,255,.25)}
  .best{margin-top:12px;text-align:center;font-size:33px;text-shadow:0 0 12px rgba(255,255,255,.25)}
  .coins{position:fixed;right:27px;top:120px;font-size:38px;z-index:4;display:flex;gap:8px;align-items:center}
  .gem{width:44px;height:36px;background:linear-gradient(135deg,#9effff,#15cfff 45%,#0871ff);clip-path:polygon(18% 0,82% 0,100% 35%,50% 100%,0 35%);filter:drop-shadow(0 0 7px #fff)}
  .pause{position:fixed;left:22px;top:116px;width:72px;height:72px;border-radius:50%;z-index:4;background:radial-gradient(circle,#17d8ff,#0876ff);border:3px solid rgba(157,245,255,.9);box-shadow:0 0 20px rgba(22,192,255,.75), inset 0 0 12px rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:33px}
  .pause small{position:absolute;bottom:11px;font-size:16px}
  .next{
    position:fixed;right:24px;bottom:230px;z-index:4;width:76px;height:76px;border-radius:50%;
    border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;
    color:white;background:rgba(0,0,0,.18);font-size:20px;backdrop-filter:blur(4px)
  }
  .overlay{
    position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at center,rgba(15,70,120,.22),rgba(0,0,0,.72));
    padding:24px;text-align:center
  }
  .panel{
    width:min(430px,92vw);padding:28px 22px;border-radius:28px;background:rgba(2,10,25,.82);
    border:1px solid rgba(91,233,255,.35);box-shadow:0 0 40px rgba(0,221,255,.18),inset 0 0 25px rgba(255,255,255,.05)
  }
  .panel h1{margin:0 0 10px;font-size:36px}
  .panel p{margin:10px 0 20px;opacity:.85;line-height:1.45}
  button{
    border:0;border-radius:999px;padding:15px 30px;font-size:18px;font-weight:900;color:#03111d;
    background:linear-gradient(135deg,#fff,#2effff 45%,#23ff79);box-shadow:0 0 22px rgba(39,255,198,.55)
  }
  .hidden{display:none}
  @media(max-width:430px){
    .title{font-size:23px}.topbar{height:70px}.score{font-size:70px}.best{font-size:29px}.coins{font-size:34px}.pause{width:66px;height:66px}
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="topbar">
  <div class="logo"></div>
  <div class="title">Neon Tile Jumper</div>
  <div class="icons">⌑ ↗</div>
</div>

<div class="pause" id="pauseBtn">Ⅱ<small>P</small></div>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best">♕ 0</div>
</div>
<div class="coins"><span id="coins">18</span><div class="gem"></div></div>
<div class="next" id="nextBtn">İleri</div>

<div class="overlay" id="startScreen">
  <div class="panel">
    <h1>Neon Tile Jumper</h1>
    <p>Top kartın üzerinde bekler. Başlayınca ritimli şekilde zıplar. Parmağınla sağa-sola kaydır, kartı kaçırma.</p>
    <button id="startBtn">Oyuna Başla</button>
  </div>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <div class="panel">
    <h1>Oyun Bitti</h1>
    <p id="finalText">Skor: 0</p>
    <button id="restartBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const coinsEl = document.getElementById("coins");
  const startScreen = document.getElementById("startScreen");
  const gameOverScreen = document.getElementById("gameOverScreen");
  const finalText = document.getElementById("finalText");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  let W,H,DPR;
  let state="ready", score=0, coins=Number(localStorage.neonCoins||18), best=Number(localStorage.neonBest||0);
  let tiles=[], player, cameraZ=0, speed=0.038, lastT=0, dragging=false, lastX=0, paused=false;
  let audioCtx=null, musicTimer=null, themeHue=190;

  coinsEl.textContent=coins;
  bestEl.textContent="♕ "+best;

  function resize(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=innerWidth; H=innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR;
    canvas.style.width=W+"px"; canvas.style.height=H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener("resize",resize); resize();

  function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  function tone(freq,dur=0.08,type="sine",gain=.04){
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gain,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
  }
  function startMusic(){
    stopMusic(); if(!audioCtx) return;
    const notes=[392,494,587,494,659,587,494,392];
    let i=0;
    musicTimer=setInterval(()=>{ if(state==="playing"&&!paused) tone(notes[i++%notes.length],.09,"triangle",.026); },190);
  }
  function stopMusic(){ if(musicTimer) clearInterval(musicTimer); musicTimer=null; }
  function gameOverSound(){
    stopMusic(); [330,260,196,110].forEach((f,i)=>setTimeout(()=>tone(f,.22,"sawtooth",.055),i*120));
  }

  function makeTile(z, x, idx){
    const near = idx < 2;
    const w = near ? 1.9 : (1.05 + Math.random()*0.85);
    const d = near ? 1.15 : (0.72 + Math.random()*0.42);
    return {x,z,w,d,hit:false,glow:0};
  }
  function reset(){
    themeHue = 140 + Math.random()*85;
    score=0; speed=.038; cameraZ=0; paused=false;
    scoreEl.textContent=score;
    tiles=[];
    let x=0, z=0;
    for(let i=0;i<34;i++){
      if(i>0) x += (Math.random()<.5?-1:1)*(0.75+Math.random()*0.55);
      x=Math.max(-1.9,Math.min(1.9,x));
      z += i===0 ? 0 : 1.15 + Math.random()*0.44;
      tiles.push(makeTile(z,x,i));
    }
    player={x:tiles[0].x,z:tiles[0].z,y:0.45,vy:0,ground:false,r:0.22,targetX:tiles[0].x};
  }
  function addTiles(){
    while(tiles.length<38){
      const last=tiles[tiles.length-1];
      let x=last.x+(Math.random()<.5?-1:1)*(0.75+Math.random()*0.65);
      x=Math.max(-2.05,Math.min(2.05,x));
      tiles.push(makeTile(last.z+1.18+Math.random()*0.5,x,tiles.length));
    }
  }

  function project(x,y,z){
    const dz=z-cameraZ+1.6;
    const scale=330/(dz*155);
    return {
      x:W/2 + x*210*scale,
      y:H*0.41 + dz*88*scale - y*310*scale,
      s:scale,
      dz
    };
  }
  function poly(points, fill, stroke, lw=2, glow=false){
    ctx.save();
    if(glow){ctx.shadowColor=stroke;ctx.shadowBlur=18}
    ctx.beginPath(); points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
    ctx.lineWidth=lw; ctx.strokeStyle=stroke; ctx.stroke(); ctx.restore();
  }
  function drawBg(){
    const g=ctx.createLinearGradient(0,74,0,H);
    g.addColorStop(0,`hsl(${themeHue},78%,20%)`);
    g.addColorStop(.34,`hsl(${themeHue},75%,38%)`);
    g.addColorStop(.35,"#071425");
    g.addColorStop(1,"#020915");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    ctx.fillStyle="rgba(2,13,27,.9)";
    ctx.beginPath(); ctx.moveTo(0,H*.32);
    for(let i=0;i<=9;i++){
      const x=i*W/8, y=H*(.30+Math.sin(i*1.3)*.035+Math.cos(i*.7)*.025);
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H*.45); ctx.lineTo(0,H*.45); ctx.closePath(); ctx.fill();

    ctx.strokeStyle=`hsla(${themeHue},100%,70%,.23)`; ctx.lineWidth=1;
    for(let i=0;i<22;i++){
      const y=H*.40+i*34; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y+i*8); ctx.stroke();
    }
    for(let i=-8;i<=8;i++){
      ctx.beginPath(); ctx.moveTo(W/2+i*45,H*.40); ctx.lineTo(W/2+i*160,H); ctx.stroke();
    }
    ctx.strokeStyle=`hsla(${themeHue},100%,70%,.9)`; ctx.lineWidth=3;
    ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.moveTo(W*.23,H); ctx.lineTo(W*.42,H*.40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W*.77,H); ctx.lineTo(W*.58,H*.40); ctx.stroke();
    ctx.shadowBlur=0;
  }
  function drawTile(t){
    const p=project(t.x,0,t.z), s=Math.max(.15,p.s);
    if(p.dz<0.05 || p.y<-50 || p.y>H+220) return;
    const w=t.w*145*s, h=t.d*92*s, lift=18*s;
    const top=[
      {x:p.x-w/2,y:p.y-h/2},{x:p.x+w/2,y:p.y-h/2},
      {x:p.x+w/2,y:p.y+h/2},{x:p.x-w/2,y:p.y+h/2}
    ];
    const side=[
      {x:p.x-w/2,y:p.y+h/2},{x:p.x+w/2,y:p.y+h/2},
      {x:p.x+w/2,y:p.y+h/2+lift},{x:p.x-w/2,y:p.y+h/2+lift}
    ];
    const hue=themeHue + (t.hit?35:0);
    poly(side,`hsl(${hue},85%,38%)`,`hsla(${hue},100%,72%,.8)`,1,false);
    poly(top,`hsl(${hue},88%,50%)`,"rgba(255,255,255,.9)",2.3,true);
    if(t.glow>0){
      ctx.save(); ctx.globalAlpha=t.glow; ctx.fillStyle="rgba(255,255,255,.45)";
      ctx.beginPath(); ctx.ellipse(p.x,p.y,22*s,8*s,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }
  function drawBall(){
    const p=project(player.x,player.y,player.z);
    const r=Math.max(12,player.r*210*p.s);
    ctx.save();
    ctx.shadowColor="white"; ctx.shadowBlur=28;
    const g=ctx.createRadialGradient(p.x-r*.35,p.y-r*.45,2,p.x,p.y,r);
    g.addColorStop(0,"#fff"); g.addColorStop(.6,"#fff"); g.addColorStop(1,"rgba(255,255,255,.82)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  function drawHand(){
    if(state!=="ready") return;
    const p=project(player.x,0,player.z);
    ctx.save(); ctx.globalAlpha=.9; ctx.strokeStyle="white"; ctx.lineWidth=5; ctx.lineCap="round"; ctx.shadowColor="white"; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(p.x,p.y+95); ctx.lineTo(p.x,p.y+135); ctx.stroke();
    ctx.font="70px Arial"; ctx.textAlign="center"; ctx.fillText("☝",p.x,p.y+150); ctx.restore();
  }

  function update(dt){
    if(state!=="playing"||paused) return;
    cameraZ += speed*dt;
    player.z = cameraZ;
    player.x += (player.targetX-player.x)*Math.min(1,dt*.012);
    player.y += player.vy*dt*.001;
    player.vy -= .00215*dt;

    const near=tiles.find(t=>Math.abs(t.z-player.z)<0.18);
    if(near && player.y<=0.45 && player.vy<0){
      const onX=Math.abs(player.x-near.x)<near.w*.42;
      if(onX){
        player.y=0.45; player.vy=.027; near.hit=true; near.glow=1;
        if(!near.counted){ near.counted=true; score++; scoreEl.textContent=score; tone(520+score*4,.07,"sine",.035); }
        if(score%12===0) themeHue=(themeHue+38)%280+80;
        speed=.038+Math.min(.035,score*.00055);
      } else if(player.y<0.28) endGame();
    }
    if(player.y<-1.2) endGame();
    tiles.forEach(t=>t.glow*=.93);
    tiles=tiles.filter(t=>t.z>cameraZ-2.4);
    addTiles();
  }
  function draw(){
    drawBg();
    tiles.slice().sort((a,b)=>b.z-a.z).forEach(drawTile);
    drawBall();
    drawHand();
  }
  function loop(t){
    const dt=Math.min(34,t-lastT||16); lastT=t;
    update(dt); draw(); requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function start(){
    initAudio(); reset(); state="playing"; startScreen.classList.add("hidden"); gameOverScreen.classList.add("hidden"); startMusic();
  }
  function endGame(){
    if(state!=="playing") return;
    state="over"; gameOverSound();
    if(score>best){best=score; localStorage.neonBest=best;}
    coins += Math.max(1,Math.floor(score/8)); localStorage.neonCoins=coins;
    bestEl.textContent="♕ "+best; coinsEl.textContent=coins;
    finalText.textContent=`Skor: ${score}  •  En iyi: ${best}`;
    setTimeout(()=>gameOverScreen.classList.remove("hidden"),450);
  }
  startBtn.onclick=start; restartBtn.onclick=start;
  pauseBtn.onclick=()=>{ if(state==="playing"){paused=!paused; pauseBtn.firstChild.nodeValue=paused?"▶":"Ⅱ";} };

  function setTarget(clientX){
    const normalized=(clientX/W-.5)*2;
    player.targetX=Math.max(-2.45,Math.min(2.45,normalized*2.35));
  }
  addEventListener("pointerdown",e=>{dragging=true;lastX=e.clientX;if(state==="ready"){} setTarget(e.clientX);});
  addEventListener("pointermove",e=>{ if(!dragging)return; const dx=e.clientX-lastX; lastX=e.clientX; player.targetX+=dx/W*5.4; player.targetX=Math.max(-2.45,Math.min(2.45,player.targetX));});
  addEventListener("pointerup",()=>dragging=false);
  addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") player.targetX-=.35;
    if(e.key==="ArrowRight") player.targetX+=.35;
    player.targetX=Math.max(-2.45,Math.min(2.45,player.targetX));
  });

  reset(); draw();
})();
</script>
</body>
</html>
